<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>Ciberdelito - Ordenar</title>
</head>
<body class="body_juego">

    <div class="pantalla-hack">
        <h2>DECODIFICAR PALABRA CLAVE</h2>
        
        <div id="palabra-destino">
            <!-- Aquí irán apareciendo las letras -->
        </div>

        <div id="letras-origen">
            <!-- Letras desordenadas de CIBERDELITO -->
            <div class="letra" onclick="intentar(this)">R</div>
            <div class="letra" onclick="intentar(this)">I</div>
            <div class="letra" onclick="intentar(this)">E</div>
            <div class="letra" onclick="intentar(this)">C</div>
            <div class="letra" onclick="intentar(this)">L</div>
            <div class="letra" onclick="intentar(this)">D</div>
            <div class="letra" onclick="intentar(this)">I</div>
            <div class="letra" onclick="intentar(this)">O</div>
            <div class="letra" onclick="intentar(this)">B</div>
            <div class="letra" onclick="intentar(this)">T</div>
            <div class="letra" onclick="intentar(this)">E</div>
        </div>
    </div>

    <script>
        const palabraCorrecta = "CIBERDELITO";
        let indiceActual = 0;

        function intentar(elemento) {
            const letraPresionada = elemento.innerText;
            const letraEsperada = palabraCorrecta[indiceActual];

            if (letraPresionada === letraEsperada) {
                // Letra correcta: se mueve arriba
                document.getElementById('palabra-destino').appendChild(elemento);
                elemento.onclick = null; // Ya no se puede tocar
                elemento.style.cursor = "default";
                elemento.style.color = "#fff";
                
                indiceActual++;

                // Verificar si terminó la palabra
                if (indiceActual === palabraCorrecta.length) {
                    setTimeout(() => {
                        // Redirige a la página del acróstico
                        window.location.href = "acrostico.html"; 
                    }, 800);
                }
            } else {
                // Letra incorrecta: efecto visual de error
                elemento.classList.add('error');
                setTimeout(() => elemento.classList.remove('error'), 200);
            }
        }
    </script>

</body>
</html>
