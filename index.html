<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA COMPROMETIDO</title>
    <style>
        body {
            background-color: rgb(183, 173, 173);
            color: #0f0; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
            animation: ruido-fondo 0.2s infinite;
        }

        /* Animación de parpadeo de color */
        @keyframes ruido-fondo {
            0% { background-color: #3a3838; }
            5% { background-color: #3e3c3c; }
            6% { background-color: #5c5858; }
            7% { background-color: #922929; } /* Flash rojo muy sutil */
            8% { background-color: #6d6464; }
            100% { background-color: #9a8989; }
        }

        /* Líneas de escaneo (estática) */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 255, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 10px;
            z-index: 2;
            pointer-events: none;
            animation: movimiento-ruido 0.1s infinite linear;
        }

        @keyframes movimiento-ruido{
            0% { background-position: 0 0;}
            100% { background-position: 0 100%;}
        }

        #contenedor {
            padding: 20px;
            text-align: center;
            animation: sacudida 0.1s infinite;
        }

        @keyframes sacudida {
            0% { transform: translate(0,0); }
            10% { transform: translate(-2px, 1px); }
            20% { transform: translate(2px, -1px); }
            30% { transform: translate(-1px, 2px); }
            100% { transform: translate(0,0); }
        }

        #pantalla {
        position: relative;
        font-size: 8vw;
        font-weight: bold;
        /* Efecto de sombra doble: roja y azul para el estilo glitch */
        text-shadow: 2px 0 #ff0000, -2px 0 #0000ff;
        animation: glitch-texto 0.3s infinite;
        }

        @keyframes glitch-texto {
            0% {
                transform: translate(0);
                text-shadow: 2px 0 #f00, -2px 0 #00f;
            }
            20% {
                transform: translate(-3px, 2px);
                text-shadow: -3px 0 #f00, 3px 0 #00f;
            }
            40% {
                transform: translate(-3px, -2px);
                color: #fff; /* Flash blanco momentáneo */
            }
            60% {
                transform: translate(3px, 2px);
                text-shadow: 2px 0 #f00, -2px 0 #00f;
            }
            80% {
                transform: translate(3px, -2px);
                opacity: 0.8;
            }
            100% {
                transform: translate(0);
            }
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #0f0;
            margin-left: 5px;
            vertical-align: middle;
            animation: parpadeo 0.7s infinite;
        }
        @keyframes parpadeo {
            50% { opacity: 0; }
        }

        /* Ajuste extra para pantallas grandes (PC) */
        @media (min-width: 768px) {
            #pantalla { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div id="contenedor">
        <span id="pantalla"></span><span class="cursor"></span>
    </div>

    <script>
        const texto = "SISTEMA HAKEADO...";
        const velocidad = 150;
        let i = 0;

        function escribir() {
            if (i < texto.length) {
                document.getElementById("pantalla").innerHTML += texto.charAt(i);
                i++;
                setTimeout(escribir, velocidad);
            }
        }

        escribir();

        setTimeout(() => {
            document.body.innerHTML = "<h1 style='color: white; text-align: center;'>SESIÓN EXPIRADA</h1>";
            window.location.href = "Juego.html";
        }, 10000);
    </script>

</body>
</html>
